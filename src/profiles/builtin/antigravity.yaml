id: antigravity
name: Antigravity
version: 1
artifact_types:
  skill:
    supported: true
    layout: nested
    targets:
      global: ~/.antigravity/skills
  agent:
    supported: true
    layout: nested
    targets:
      global: ~/.antigravity/agents
  hook:
    supported: false
  mcp:
    supported: true
    layout: config
  command:
    supported: false
  output_style:
    supported: false
capabilities:
  hooks:
    supported: false
  mcp:
    supported: true
    config_formats: [json, yaml]
  shell:
    supported: true
  plugins:
    supported: false
deactivation:
  strategy: remove_from_active_target
