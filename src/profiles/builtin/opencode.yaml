id: opencode
name: OpenCode
version: 1
artifact_types:
  skill:
    supported: true
    layout: nested
    targets:
      global: ~/.config/opencode/skills
  agent:
    supported: true
    layout: nested
    targets:
      global: ~/.config/opencode/agents
  hook:
    supported: true
    layout: config
    dialect: opencode
  mcp:
    supported: true
    layout: config
  command:
    supported: true
    layout: nested
    targets:
      global: ~/.config/opencode/commands
  output_style:
    supported: true
    layout: nested
    targets:
      global: ~/.config/opencode/output-styles
capabilities:
  hooks:
    supported: true
    dialects: [opencode]
  mcp:
    supported: true
    config_formats: [json, yaml]
  shell:
    supported: true
  plugins:
    supported: true
deactivation:
  strategy: remove_from_active_target
