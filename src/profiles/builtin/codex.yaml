id: codex
name: Codex
version: 1
artifact_types:
  skill:
    supported: true
    layout: nested
    targets:
      global: ~/.codex/skills
  agent:
    supported: false
  hook:
    supported: false
  mcp:
    supported: true
    layout: config
  command:
    supported: true
    layout: nested
    targets:
      global: ~/.codex/commands
  output_style:
    supported: false
capabilities:
  hooks:
    supported: false
  mcp:
    supported: true
    config_formats: [toml]
  shell:
    supported: true
  plugins:
    supported: false
deactivation:
  strategy: remove_from_active_target
