id: claude-code
name: Claude Code
version: 1
artifact_types:
  skill:
    supported: true
    layout: flat
    targets:
      global: ~/.claude/skills
      project: .claude/skills
  agent:
    supported: true
    layout: flat
    targets:
      global: ~/.claude/agents
      project: .claude/agents
  hook:
    supported: true
    layout: config
    dialect: claude-code
  mcp:
    supported: true
    layout: config
  command:
    supported: true
    layout: flat
    targets:
      global: ~/.claude/commands
      project: .claude/commands
  output_style:
    supported: true
    layout: flat
    targets:
      global: ~/.claude/output-styles
capabilities:
  hooks:
    supported: true
    dialects: [claude-code]
  mcp:
    supported: true
    config_formats: [json]
  shell:
    supported: true
  plugins:
    supported: false
deactivation:
  strategy: remove_from_active_target
